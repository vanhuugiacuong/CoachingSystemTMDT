<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor Dashboard - BCN Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: "#2563eb", soft: "#60a5fa" }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
  <div id="mkd-navbar"></div>

  <main class="flex-1 max-w-6xl mx-auto px-4 sm:px-6 pt-8 pb-12 w-full">
    <header class="mb-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Mentor Dashboard</h1>
          <p class="text-sm text-slate-500 mt-1">
            Trang demo dành cho role Mentor (whitelist email).
          </p>
        </div>
        <span class="inline-flex items-center h-7 px-3 rounded-full bg-indigo-50 text-[11px] font-medium text-indigo-700">
          Mentor
        </span>
      </div>
    </header>

    <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Tin nhắn (7 ngày)</p>
        <p id="mkd-mentor-kpi-chats" class="mt-2 text-2xl font-semibold text-slate-900">0</p>
        <p class="mt-1 text-xs text-slate-500">Nguồn: `mkd-mentor-chats`.</p>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Học viên nhắn</p>
        <p id="mkd-mentor-kpi-students" class="mt-2 text-2xl font-semibold text-slate-900">0</p>
        <p class="mt-1 text-xs text-slate-500">Đếm theo `userEmail`.</p>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Gợi ý</p>
        <p class="mt-2 text-sm text-slate-700">
          Có thể mở rộng để mentor xem danh sách chat theo học viên / theo khóa.
        </p>
      </div>
    </section>

    <section class="mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm">
      <div class="px-6 py-4 border-b border-slate-100">
        <h2 class="text-sm font-semibold text-slate-900">Tin nhắn gần đây</h2>
      </div>
      <div id="mkd-mentor-chat-list" class="px-6 py-4 space-y-2 text-sm text-slate-700"></div>
    </section>
  </main>

  <div id="mkd-footer"></div>

  <script type="module">
    import { renderStudentNavbar, renderSiteFooter } from "./js/layout.js";
    import { requireMentor } from "./js/session.js";

    renderStudentNavbar("dashboard");
    renderSiteFooter();

    await requireMentor({ redirectTo: "auth.html", denyTo: "dashboard.html" });

    function toDayKey(dateLike) {
      const d = new Date(dateLike);
      if (Number.isNaN(d.getTime())) return null;
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function lastNDaysKeys(days) {
      const out = [];
      const now = new Date();
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        out.push(toDayKey(d));
      }
      return out.filter(Boolean);
    }

    function loadChats() {
      try {
        const raw = localStorage.getItem("mkd-mentor-chats");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    const days = lastNDaysKeys(7);
    const chats = loadChats();
    const recent = chats.filter((c) => {
      const k = toDayKey(c?.timestamp);
      return k && days.includes(k);
    });

    const uniqueStudents = new Set(
      recent.map((c) => String(c?.userEmail || "").toLowerCase()).filter(Boolean)
    );

    const chatsKpi = document.getElementById("mkd-mentor-kpi-chats");
    const studentsKpi = document.getElementById("mkd-mentor-kpi-students");
    if (chatsKpi) chatsKpi.textContent = String(recent.length);
    if (studentsKpi) studentsKpi.textContent = String(uniqueStudents.size);

    const listEl = document.getElementById("mkd-mentor-chat-list");
    if (listEl) {
      const rows = recent
        .slice(-15)
        .reverse()
        .map((c) => {
          const ts = c?.timestamp ? new Date(c.timestamp).toLocaleString("vi-VN") : "";
          const email = c?.userEmail || "student";
          const msg = c?.message || "";
          return `
            <div class="rounded-xl border border-slate-200 px-4 py-3">
              <p class="text-xs text-slate-500">${email}${ts ? ` · ${ts}` : ""}</p>
              <p class="mt-1">${String(msg).replaceAll("<", "&lt;").replaceAll(">", "&gt;")}</p>
            </div>
          `;
        })
        .join("");
      listEl.innerHTML = rows || '<p class="text-sm text-slate-500">Chưa có tin nhắn nào.</p>';
    }
  </script>
</body>
</html>
