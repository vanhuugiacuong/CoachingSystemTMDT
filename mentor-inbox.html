<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tin nhắn - BCN Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: "#2563eb", soft: "#60a5fa" }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">
  <div id="mkd-navbar"></div>

  <main class="flex-1 max-w-6xl mx-auto px-4 sm:px-6 pt-8 pb-12 w-full">
    <header class="mb-6">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between sm:gap-4">
        <div>
          <h1 class="text-2xl font-semibold text-slate-900">Tin nhắn học viên</h1>
          <p class="text-sm text-slate-500 mt-1">
            Đồng bộ với chat nhanh ở trang Tiến độ học tập (key: <span class="font-mono">mkd-mentor-chats</span>).
          </p>
        </div>
      </div>
    </header>

    <section class="grid gap-4 lg:grid-cols-[minmax(0,320px),minmax(0,1fr)]">
      <aside class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100">
          <h2 class="text-sm font-semibold text-slate-900">Học viên</h2>
          <p class="text-xs text-slate-500 mt-1">Chọn để xem hội thoại.</p>
        </div>
        <div id="mkd-mentor-inbox-students" class="divide-y divide-slate-100"></div>
        <div id="mkd-mentor-inbox-students-empty" class="hidden px-5 py-8 text-sm text-slate-500">
          Chưa có tin nhắn nào.
        </div>
      </aside>

      <article class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden flex flex-col min-h-[520px]">
        <div class="px-5 py-4 border-b border-slate-100">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h2 class="text-sm font-semibold text-slate-900 truncate" id="mkd-mentor-inbox-thread-title">
                Chọn một học viên
              </h2>
              <p class="text-xs text-slate-500 mt-1" id="mkd-mentor-inbox-thread-subtitle">--</p>
            </div>
            <button
              type="button"
              id="mkd-mentor-inbox-refresh"
              class="inline-flex items-center justify-center h-9 px-4 rounded-full border border-slate-200 text-xs font-medium text-slate-700 hover:bg-slate-50"
            >
              Làm mới
            </button>
          </div>
        </div>

        <div id="mkd-mentor-inbox-messages" class="flex-1 overflow-auto px-5 py-4 space-y-2 bg-slate-50"></div>

        <div class="border-t border-slate-100 p-4 bg-white">
          <div class="flex items-center gap-2">
            <input
              id="mkd-mentor-inbox-input"
              type="text"
              placeholder="Nhập trả lời cho học viên..."
              class="flex-1 h-10 rounded-xl border border-slate-200 px-3 text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              autocomplete="off"
              disabled
            />
            <button
              id="mkd-mentor-inbox-send"
              type="button"
              class="inline-flex items-center justify-center h-10 px-4 rounded-xl bg-primary text-white text-sm font-medium hover:bg-primary-soft disabled:opacity-50 disabled:cursor-not-allowed"
              disabled
            >
              Gửi
            </button>
          </div>
          <p class="mt-2 text-[11px] text-slate-400">
            Reply sẽ được lưu vào <span class="font-mono">mkd-mentor-chats</span> với <span class="font-mono">from: "mentor"</span>.
          </p>
        </div>
      </article>
    </section>
  </main>

  <div id="mkd-footer"></div>

  <script type="module">
    import { renderStudentNavbar, renderSiteFooter } from "./js/layout.js";
    import { requireMentor } from "./js/session.js";

    renderStudentNavbar("mentor-inbox", { forceMentor: true });
    renderSiteFooter();
    await requireMentor({ redirectTo: "auth.html", denyTo: "dashboard.html" });

    function escapeHtml(text) {
      const map = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      };
      return String(text || "").replace(/[&<>"']/g, (m) => map[m]);
    }

    function loadChats() {
      try {
        const raw = localStorage.getItem("mkd-mentor-chats");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveChats(chats) {
      localStorage.setItem("mkd-mentor-chats", JSON.stringify(Array.isArray(chats) ? chats : []));
    }

    function normalizeEmail(email) {
      return String(email || "").trim().toLowerCase();
    }

    function parseTs(ts) {
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function formatTs(ts) {
      const d = parseTs(ts);
      return d ? d.toLocaleString("vi-VN") : "";
    }

    function groupByStudent(chats) {
      const by = new Map();
      chats.forEach((c) => {
        const userEmail = normalizeEmail(c?.userEmail);
        if (!userEmail) return;
        const list = by.get(userEmail) || [];
        list.push(c);
        by.set(userEmail, list);
      });
      // sort each thread by timestamp asc
      by.forEach((list, key) => {
        list.sort((a, b) => String(a?.timestamp || "").localeCompare(String(b?.timestamp || "")));
        by.set(key, list);
      });
      // sort students by last message desc
      const students = Array.from(by.keys()).sort((a, b) => {
        const la = by.get(a)?.[by.get(a).length - 1]?.timestamp || "";
        const lb = by.get(b)?.[by.get(b).length - 1]?.timestamp || "";
        return String(lb).localeCompare(String(la));
      });
      return { by, students };
    }

    const studentsEl = document.getElementById("mkd-mentor-inbox-students");
    const studentsEmptyEl = document.getElementById("mkd-mentor-inbox-students-empty");
    const titleEl = document.getElementById("mkd-mentor-inbox-thread-title");
    const subtitleEl = document.getElementById("mkd-mentor-inbox-thread-subtitle");
    const messagesEl = document.getElementById("mkd-mentor-inbox-messages");
    const inputEl = document.getElementById("mkd-mentor-inbox-input");
    const sendBtn = document.getElementById("mkd-mentor-inbox-send");
    const refreshBtn = document.getElementById("mkd-mentor-inbox-refresh");

    let selectedStudent = "";

    function renderStudents() {
      if (!studentsEl || !studentsEmptyEl) return;
      const chats = loadChats();
      const { by, students } = groupByStudent(chats);

      if (!students.length) {
        studentsEl.innerHTML = "";
        studentsEmptyEl.classList.remove("hidden");
        return;
      }
      studentsEmptyEl.classList.add("hidden");

      // default selection
      if (!selectedStudent || !by.has(selectedStudent)) {
        selectedStudent = students[0];
      }

      studentsEl.innerHTML = students
        .map((email) => {
          const list = by.get(email) || [];
          const last = list[list.length - 1] || {};
          const lastText = String(last?.message || "");
          const isActive = email === selectedStudent;
          return `
            <button
              type="button"
              data-mkd-student="${escapeHtml(email)}"
              class="w-full text-left px-5 py-3 hover:bg-slate-50 ${isActive ? "bg-slate-900 text-white hover:bg-slate-900" : "bg-white text-slate-900"}"
            >
              <p class="text-sm font-semibold truncate">${escapeHtml(email)}</p>
              <p class="text-[11px] ${isActive ? "text-slate-200" : "text-slate-500"} truncate mt-0.5">
                ${escapeHtml(lastText || "—")}
              </p>
            </button>
          `;
        })
        .join("");

      // click binding
      studentsEl.querySelectorAll("button[data-mkd-student]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const email = btn.getAttribute("data-mkd-student") || "";
          selectedStudent = normalizeEmail(email);
          renderAll();
        });
      });
    }

    function renderThread() {
      if (!messagesEl || !titleEl || !subtitleEl || !inputEl || !sendBtn) return;
      const chats = loadChats();
      const { by } = groupByStudent(chats);
      const thread = selectedStudent ? by.get(selectedStudent) || [] : [];

      if (!selectedStudent) {
        titleEl.textContent = "Chọn một học viên";
        subtitleEl.textContent = "--";
        messagesEl.innerHTML = "";
        inputEl.disabled = true;
        sendBtn.disabled = true;
        return;
      }

      titleEl.textContent = selectedStudent;
      subtitleEl.textContent = `${thread.length} tin nhắn`;
      inputEl.disabled = false;
      sendBtn.disabled = false;

      messagesEl.innerHTML = thread
        .map((m) => {
          const from = String(m?.from || "").toLowerCase();
          const isMentor = from === "mentor";
          const ts = formatTs(m?.timestamp);
          const bubbleCls = isMentor
            ? "bg-primary text-white rounded-2xl rounded-tr-sm"
            : "bg-white text-slate-900 rounded-2xl rounded-tl-sm border border-slate-200";
          const wrapCls = isMentor ? "flex justify-end" : "flex justify-start";
          return `
            <div class="${wrapCls}">
              <div class="max-w-[85%] px-3 py-2 ${bubbleCls}">
                <p class="text-sm whitespace-pre-wrap">${escapeHtml(m?.message || "")}</p>
                <p class="mt-1 text-[10px] ${isMentor ? "text-white/80" : "text-slate-400"}">${escapeHtml(ts)}</p>
              </div>
            </div>
          `;
        })
        .join("");

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendReply() {
      if (!selectedStudent || !(inputEl instanceof HTMLInputElement)) return;
      const text = inputEl.value.trim();
      if (!text) return;

      const chats = loadChats();
      chats.push({
        from: "mentor",
        userEmail: selectedStudent,
        message: text,
        timestamp: new Date().toISOString()
      });
      saveChats(chats);

      inputEl.value = "";
      renderAll();
    }

    function renderAll() {
      renderStudents();
      renderThread();
    }

    if (sendBtn) sendBtn.addEventListener("click", sendReply);
    if (inputEl instanceof HTMLInputElement) {
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendReply();
        }
      });
    }
    if (refreshBtn) refreshBtn.addEventListener("click", () => renderAll());

    // auto refresh when other tabs/pages write to localStorage
    window.addEventListener("storage", (e) => {
      if (e.key === "mkd-mentor-chats") renderAll();
    });

    renderAll();
  </script>
</body>
</html>
