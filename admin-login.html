<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập Admin - BCN Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: "#2563eb",
              soft: "#60a5fa"
            }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="mb-6 text-center">
      <div class="mx-auto mb-3 h-12 w-12 rounded-2xl bg-primary text-white flex items-center justify-center text-xl font-semibold">
        AD
      </div>
      <h1 class="text-xl font-semibold text-slate-900">Đăng nhập khu vực Admin</h1>
      <p class="text-xs text-slate-500 mt-1">
        Khu vực dành riêng cho quản trị viên BCN Coach.
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6">
      <form id="mkd-admin-login-form" class="space-y-4 text-sm">
        <div>
          <label for="mkd-admin-email" class="block text-xs font-medium text-slate-700 mb-1">
            Email admin
          </label>
          <input
            id="mkd-admin-email"
            type="email"
            required
            placeholder="admin@bcncoach.vn"
            class="w-full h-10 rounded-xl border border-slate-200 px-3 bg-slate-50 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
          />
        </div>
        <div>
          <label for="mkd-admin-password" class="block text-xs font-medium text-slate-700 mb-1">
            Mật khẩu
          </label>
          <input
            id="mkd-admin-password"
            type="password"
            required
            placeholder="••••••••"
            class="w-full h-10 rounded-xl border border-slate-200 px-3 bg-slate-50 text-sm focus:outline-none focus:ring-1 focus:ring-primary"
          />
        </div>

        <div id="mkd-admin-error" class="hidden text-xs text-rose-600 bg-rose-50 border border-rose-100 rounded-xl px-3 py-2">
          Thông tin đăng nhập không chính xác. Vui lòng thử lại.
        </div>

        <button
          type="submit"
          class="w-full h-10 rounded-xl bg-primary text-white text-sm font-medium hover:bg-primary-soft"
        >
          Đăng nhập Admin
        </button>
      </form>

      <p class="mt-4 text-[11px] text-slate-400 text-center">
        Tài khoản demo: <span class="font-medium text-slate-600">admin@bcncoach.vn / 123456</span>
      </p>
      <p class="mt-1 text-[11px] text-slate-400 text-center">
        Người dùng thông thường vẫn đăng nhập qua trang <span class="font-medium">auth.html</span>.
      </p>
    </div>
  </div>

  <script type="module">
    import { isAdmin, setAdminSession } from "./js/session.js";

    // Nếu đã có role admin thì chuyển thẳng vào dashboard
    if (isAdmin()) {
      window.location.href = "admin-dashboard.html";
    }

    const form = document.getElementById("mkd-admin-login-form");
    const errorBox = document.getElementById("mkd-admin-error");

    form?.addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("mkd-admin-email")?.value?.trim?.() || "";
      const password = document.getElementById("mkd-admin-password")?.value || "";

      // Demo: hard-code tài khoản admin
      const DEMO_EMAIL = "admin@bcncoach.vn";
      const DEMO_PASSWORD = "123456";

      if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
        setAdminSession({ name: "Admin System" });
        if (errorBox) errorBox.classList.add("hidden");
        window.location.href = "admin-dashboard.html";
      } else {
        if (errorBox) errorBox.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
